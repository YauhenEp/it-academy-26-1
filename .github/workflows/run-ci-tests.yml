name: Run unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: 
      - "**"
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run tests on'
        required: true
        default: 'main'
      env:
        description: 'Environment to run tests in'
        required: true
        default: 'test'
        options:
          - dev
          - test
          - staging
          - production
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      working-directory: ./jestjs
      run: npm install

    - name: Run tests
      working-directory: ./jestjs
      run: npm run test